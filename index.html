<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 12 - Form Dinamis Bootstrap</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-custom { background: #007bff; color: white; border-radius: 15px 15px 0 0; padding: 20px; }
        #hasilContainer { display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="header-custom text-center">
                    <h3>Form Input Praktikum</h3>
                </div>
                <div class="card-body">
                    <form id="formTugas">
                        <!-- Input Nama -->
                        <div class="mb-3">
                            <label class="form-label">Nama Lengkap</label>
                            <input type="text" id="inputNama" class="form-control" placeholder="Contoh: Salman Alfarizi" required>
                        </div>

                        <!-- Select Dropdown (50 Poin) -->
                        <div class="mb-3">
                            <label class="form-label">Kategori Praktikum</label>
                            <select id="inputKategori" class="form-select" required>
                                <option value="" disabled selected>Pilih Kategori...</option>
                                <option value="Web Development">Web Development</option>
                                <option value="Cyber Security">Cyber Security</option>
                                <option value="Networking">Networking</option>
                            </select>
                        </div>

                        <!-- Input Date (50 Poin) -->
                        <div class="mb-3">
                            <label class="form-label">Tanggal Pengumpulan</label>
                            <input type="date" id="inputTanggal" class="form-control" required>
                        </div>

                        <button type="button" onclick="tampilkanData()" class="btn btn-primary w-100">Kirim Data</button>
                    </form>

                    <!-- Tempat Menampilkan Data -->
                    <div id="hasilContainer" class="alert alert-success mt-4">
                        <h5 class="alert-heading">Data Berhasil Disimpan!</h5>
                        <hr>
                        <p><strong>Nama:</strong> <span id="outNama"></span></p>
                        <p><strong>Kategori:</strong> <span id="outKategori"></span></p>
                        <p><strong>Tanggal:</strong> <span id="outTanggal"></span></p>
                    </div>
                </div>
            </div>
            <p class="text-center mt-3 text-muted">Salman Alfarizi | 20240140057</p>
        </div>
    </div>
</div>

<!-- JavaScript untuk Menampilkan Data -->
<script>
    function tampilkanData() {
        // Ambil Nilai
        const nama = document.getElementById('inputNama').value;
        const kategori = document.getElementById('inputKategori').value;
        const tanggal = document.getElementById('inputTanggal').value;

        // Validasi Sederhana
        if(nama && kategori && tanggal) {
            // Tampilkan ke Elemen Output
            document.getElementById('outNama').innerText = nama;
            document.getElementById('outKategori').innerText = kategori;
            document.getElementById('outTanggal').innerText = tanggal;

            // Munculkan Container Hasil
            document.getElementById('hasilContainer').style.display = 'block';
        } else {
            alert("Harap isi semua kolom!");
        }
    }
</script>

</body>
</html>
